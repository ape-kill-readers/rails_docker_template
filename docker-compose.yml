version: '3'

services:
  db:
    image: mysql:8
    environment:
      MYSQL_HOST: mysql
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - rails_docker_mysql_volumes:/var/lib/mysql


  app:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails  s -p 3000 -b '0.0.0.0'"
    volumes:
      - .:/rails-docker
    ports:
      - 3000:3000
    depends_on:
      - db
  
volumes:
  rails_docker_mysql_volumes:

